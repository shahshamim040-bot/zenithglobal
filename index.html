<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenit Global - Authentication</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #00ffcc;
            --primary-glow: rgba(0, 255, 204, 0.25);
            --bg-dark: #060a13;
            --card-bg: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #6f8097;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body {
            background: radial-gradient(circle at 50% 0%, #131e36 0%, var(--bg-dark) 70%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .auth-container { width: 100%; max-width: 450px; position: relative; }

        .logo-wrapper { text-align: center; position: relative; z-index: 10; margin-bottom: -35px; animation: floatingLogo 4s ease-in-out infinite; }
        .logo-wrapper img { width: 95px; height: 95px; object-fit: contain; border-radius: 50%; background: #060a13; padding: 10px; border: 2px solid var(--border); box-shadow: 0 0 25px var(--primary-glow); }

        @keyframes floatingLogo {
            0%, 100% { transform: translateY(0); filter: drop-shadow(0 5px 15px rgba(0,255,204,0.2)); }
            50% { transform: translateY(-8px); filter: drop-shadow(0 15px 25px var(--primary-glow)); }
        }

        .auth-card { background: var(--card-bg); border: 1px solid var(--border); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); padding: 55px 30px 35px 30px; border-radius: 24px; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6); }
        .brand-title { text-align: center; margin-bottom: 25px; }
        .brand-title h2 { font-size: 1.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; background: linear-gradient(135deg, #fff 40%, #8db5fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .brand-title p { font-size: 0.75rem; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 3px; }

        .form-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
        .name-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.9rem; z-index: 5; }
        .input-wrapper input { width: 100%; padding: 13px 15px 13px 45px; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border); border-radius: 12px; color: var(--text-main); font-size: 0.88rem; outline: none; transition: 0.3s; }
        .input-wrapper input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 255, 204, 0.1); }

        /* Slim Country Search Styles */
        .iti { width: 100%; }
        .input-wrapper input[type="tel"] { padding-left: 55px !important; }
        .iti__country-list { background-color: #0b111e !important; border: 1px solid var(--border) !important; color: #fff !important; border-radius: 10px; max-height: 180px; width: 300px; font-size: 0.82rem; }
        .iti__country { padding: 6px 10px !important; }
        .iti__country:hover, .iti__country.iti__highlight { background-color: rgba(0, 255, 204, 0.1) !important; color: var(--primary) !important; }

        .captcha-container { display: flex; align-items: center; justify-content: space-between; background: rgba(0, 0, 0, 0.4); padding: 10px 15px; border-radius: 12px; border: 1px solid var(--border); }
        .captcha-visual { font-weight: 700; color: var(--primary); letter-spacing: 4px; font-style: italic; user-select: none; }

        .btn-action { width: 100%; padding: 14px; background: linear-gradient(135deg, #00cb9c 0%, var(--primary) 100%); border: none; border-radius: 12px; color: #060a13; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-action:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(0, 255, 204, 0.3); }

        /* VIP ওয়ান-ট্যাপ গুগল বাটন ও ডিভাইডার ডিজাইন */
        .social-divider { display: flex; align-items: center; text-align: center; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; margin: 20px 0; }
        .social-divider::before, .social-divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border); }
        .social-divider:not(:empty)::before { margin-right: .5em; }
        .social-divider:not(:empty)::after { margin-left: .5em; }

        .btn-google { width: 100%; padding: 13px; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); border-radius: 12px; color: #fff; font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; transition: 0.3s; }
        .btn-google:hover { background: rgba(255, 255, 255, 0.08); border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 255, 204, 0.1); }
        .btn-google img { width: 18px; height: 18px; }

        .footer-links { text-align: center; margin-top: 20px; font-size: 0.82rem; display: flex; justify-content: space-between; padding: 0 5px; }
        .footer-links a { color: var(--text-muted); text-decoration: none; transition: 0.3s; }
        .footer-links a:hover { color: var(--primary); }
        .hidden { display: none !important; }

        #customToast { position: fixed; top: 25px; right: 25px; padding: 16px 24px; border-radius: 12px; color: #fff; font-weight: 600; font-size: 0.88rem; z-index: 10000; box-shadow: 0 8px 30px rgba(0,0,0,0.5); transform: translateY(-20px); opacity: 0; transition: 0.4s ease; max-width: 350px; line-height: 1.4; }
    </style>
</head>
<body>

<div id="customToast">Notification</div>

<div class="auth-container">
    <div class="logo-wrapper">
        <img src="logo.png" alt="Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2991/2991195.png';">
    </div>

    <!-- রেজিস্ট্রেশন প্যানেল -->
    <div class="auth-card hidden" id="registerCard">
        <div class="brand-title"><h2>Zenit Global</h2><p>Registration Panel</p></div>
        <form id="registerForm">
            <div class="form-grid">
                <div class="input-wrapper"><input type="text" id="regUsername" placeholder="Username" required autocomplete="off"><i class="fa-solid fa-user"></i></div>
                <div class="name-row">
                    <div class="input-wrapper"><input type="text" id="regFirstName" placeholder="First Name" required autocomplete="off"><i class="fa-solid fa-id-card"></i></div>
                    <div class="input-wrapper"><input type="text" id="regLastName" placeholder="Last Name" required autocomplete="off"><i class="fa-solid fa-id-card"></i></div>
                </div>
                <div class="input-wrapper"><input type="tel" id="regPhone" required autocomplete="off" placeholder="Phone Number"></div>
                <div class="input-wrapper"><input type="email" id="regEmail" placeholder="Email Address" required autocomplete="off"><i class="fa-solid fa-envelope"></i></div>
                <div class="input-wrapper"><input type="password" id="regPassword" placeholder="Security Password" required><i class="fa-solid fa-lock"></i></div>
                <div class="input-wrapper"><input type="text" id="referrerInput" placeholder="Referral Code (Optional)" autocomplete="off"><i class="fa-solid fa-gift"></i></div>
                <div class="captcha-container">
                    <span class="captcha-visual" id="captchaCode">XXXXX</span>
                    <i class="fa-solid fa-rotate" onclick="generateCaptcha()" style="cursor:pointer; color:var(--text-muted)"></i>
                    <input type="text" id="captchaInput" placeholder="Captcha" style="width: 35%; padding: 8px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 8px; color: #fff; text-align: center;" required>
                </div>
                <button type="submit" class="btn-action">Register Account</button>
            </div>
        </form>

        <div class="social-divider">Or Access With</div>
        <button class="btn-google" onclick="loginWithGoogle()"><img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" alt="Google"> Continue with Google</button>

        <div class="footer-links" style="justify-content: center; margin-top: 25px;"><a href="#" onclick="showForm('login')">Already have an account? <span style="color:var(--primary)">Sign In</span></a></div>
    </div>

    <!-- লগইন প্যানেল -->
    <div class="auth-card" id="loginCard">
        <div class="brand-title"><h2>Zenit Global</h2><p>Secure Client Sign In</p></div>
        <form id="loginForm">
            <div class="form-grid">
                <div class="input-wrapper"><input type="email" id="loginEmail" placeholder="Email Address" required><i class="fa-solid fa-envelope"></i></div>
                <div class="input-wrapper"><input type="password" id="loginPassword" placeholder="Password" required><i class="fa-solid fa-lock"></i></div>
                <button type="submit" class="btn-action">Sign In Platform</button>
            </div>
        </form>

        <div class="social-divider">Or Access With</div>
        <button class="btn-google" onclick="loginWithGoogle()"><img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" alt="Google"> Sign In with Google</button>

        <div class="footer-links">
            <a href="#" onclick="showForm('register')">Create Account</a>
            <a href="#" onclick="showForm('forgot')">Forgot Password?</a>
        </div>
    </div>

    <!-- পাসওয়ার্ড রিসেট প্যানেল -->
    <div class="auth-card hidden" id="forgotCard">
        <div class="brand-title"><h2>Zenit Global</h2><p>Reset Protection</p></div>
        <form id="forgotForm">
            <div class="form-grid">
                <div class="input-wrapper"><input type="email" id="forgotEmail" placeholder="Registered Email" required><i class="fa-solid fa-envelope"></i></div>
                <button type="submit" class="btn-action">Send Reset Link</button>
            </div>
        </form>
        <div class="footer-links" style="justify-content: center;"><a href="#" onclick="showForm('login')">Back to Sign In</a></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>
<script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDvyHqU-dR3mAPs7NfIi94_4vUl3lBxsCo",
      authDomain: "zenith-global-5e2a4.firebaseapp.com",
      projectId: "zenith-global-5e2a4",
      storageBucket: "zenith-global-5e2a4.firebasestorage.app",
      messagingSenderId: "770652839682",
      appId: "1:770652839682:web:a1b02cb4040e3727c7ec1b"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const phoneInput = window.intlTelInput(document.querySelector("#regPhone"), {
        preferredCountries: ["sa", "bd", "ae", "us"],
        nationalMode: false,
        autoPlaceholder: "off",
        utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js"
    });

    function showForm(panel) {
        document.getElementById('registerCard').classList.add('hidden');
        document.getElementById('loginCard').classList.add('hidden');
        document.getElementById('forgotCard').classList.add('hidden');
        if(panel === 'register') { document.getElementById('registerCard').classList.remove('hidden'); generateCaptcha(); }
        if(panel === 'login') document.getElementById('loginCard').classList.remove('hidden');
        if(panel === 'forgot') document.getElementById('forgotCard').classList.remove('hidden');
    }

    function generateCaptcha() {
        const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        let code = "";
        for (let i = 0; i < 5; i++) code += chars[Math.floor(Math.random() * chars.length)];
        document.getElementById('captchaCode').innerText = code;
    }
    generateCaptcha();

    function notify(msg, mode='success') {
        const toast = document.getElementById('customToast');
        toast.innerHTML = msg;
        toast.style.background = mode === 'success' ? '#00cb9c' : '#ff4a4a';
        toast.style.opacity = '1';
        toast.style.transform = 'translateY(0)';
        setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateY(-20px)'; }, 5500);
    }

    // Google ১-ক্লিক সাইন-ইন এবং অটোমেটিক ডাটাবেজ রেজিস্ট্রেশন সিস্টেম
    async function loginWithGoogle() {
        const googleProvider = new firebase.auth.GoogleAuthProvider();
        try {
            const result = await auth.signInWithPopup(googleProvider);
            const user = result.user;
            
            // ইউজার ডাটাবেজে আগে থেকে আছে কি না চেক করা
            const userDoc = await db.collection("users").doc(user.uid).get();
            
            if (!userDoc.exists) {
                // নতুন ইউজার হলে ডাটাবেজে তার প্রোফাইল অটো তৈরি হবে
                const displayNameParts = user.displayName ? user.displayName.split(" ") : ["User", ""];
                const fName = displayNameParts[0];
                const lName = displayNameParts.slice(1).join(" ") || "Node";
                const uName = user.email.split("@")[0].replace(/[^a-zA-省0-9]/g, "") + Math.floor(100 + Math.random() * 900);
                
                const urlParams = new URLSearchParams(window.location.search);
                const referrer = urlParams.get('ref') || null;

                await db.collection("users").doc(user.uid).set({
                    uid: user.uid,
                    username: uName.toLowerCase(),
                    firstName: fName,
                    lastName: lName,
                    phone: user.phoneNumber || "Google Account",
                    country: "Auto-Detected",
                    email: user.email,
                    passwordBackup: "OAuth-Google Secured",
                    referrer: referrer,
                    balance: 0,
                    isVerified: true, // গুগল অ্যাকাউন্ট ভেরিফাইড থাকে
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }

            notify("✔ Secure Sign In Successful! Synced with Google Core.", "success");
            setTimeout(() => { window.location.href = "dashboard.html"; }, 1500);
        } catch (err) {
            notify("❌ Google Authentication Failed: " + err.message, "error");
        }
    }

    // ম্যানুয়াল রেজিস্ট্রেশন সাবমিশন
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const capCode = document.getElementById('captchaCode').innerText;
        const capInput = document.getElementById('captchaInput').value.trim().toUpperCase();
        if(capInput !== capCode) { notify("🚨 Captcha matching failed!", "error"); generateCaptcha(); return; }

        const username = document.getElementById('regUsername').value.trim().toLowerCase();
        const firstName = document.getElementById('regFirstName').value.trim();
        const lastName = document.getElementById('regLastName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const referrer = document.getElementById('referrerInput').value.trim().toLowerCase();
        const fullPhone = phoneInput.getNumber(); 
        const countryName = phoneInput.getSelectedCountryData().name;

        try {
            const checkUser = await db.collection("users").where("username", "==", username).get();
            if(!checkUser.empty) { notify("❌ Username is already taken!", "error"); return; }

            const cred = await auth.createUserWithEmailAndPassword(email, password);
            await cred.user.sendEmailVerification();

            await db.collection("users").doc(cred.user.uid).set({
                uid: cred.user.uid, username, firstName, lastName, phone: fullPhone, country: countryName, email, passwordBackup: password, referrer: referrer || null, balance: 0, isVerified: false, createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            // স্প্যাম ফোল্ডারের ভিআইপি নোটিশ অ্যালার্ট
            notify("✔ Registration Successful!<br><br>⚠️ <strong>গুরুত্বপূর্ণ নোটিশ:</strong> ভেরিফিকেশন মেইলটি আপনার ইমেইলের <strong>Spam (স্প্যাম ফোল্ডার)</strong>-এ যেতে পারে। দয়া করে ইনবক্সের পাশাপাশি স্প্যাম ফোল্ডারটি চেক করে অ্যাকাউন্ট কনফার্ম করুন।", "success");
            e.target.reset();
            setTimeout(() => showForm('login'), 5000);
        } catch (err) { notify("❌ Error: " + err.message, "error"); }
    });

    // ম্যানুয়াল লগইন সাবমিশন
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;

        try {
            const cred = await auth.signInWithEmailAndPassword(email, password);
            if(!cred.user.emailVerified) { 
                notify("⚠️ Verification Required!<br>আপনার ইমেইলটি ভেরিফাই করা হয়নি। দয়া করে আপনার জিমেইলের <strong>Spam (স্প্যাম ফোল্ডার)</strong> অথবা ইনবক্স চেক করে লিঙ্কটি ভেরিফাই করুন।", "error"); 
                await auth.signOut(); 
                return; 
            }

            notify("✔ Successfully Authenticated! Loading Hub...", "success");
            setTimeout(() => { window.location.href = "dashboard.html"; }, 1500);
        } catch (err) { notify("❌ Login Blocked: " + err.message, "error"); }
    });

    // ফরগট পাসওয়ার্ড
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('forgotEmail').value.trim();
        try {
            await auth.sendPasswordResetEmail(email);
            notify("🔗 Reset link sent! Also make sure to check your <strong>Spam Folder</strong> if you don't receive it.", "success");
            setTimeout(() => showForm('login'), 3500);
        } catch (err) { notify("❌ Error: " + err.message, "error"); }
    });

    const urlParams = new URLSearchParams(window.location.search);
    const ref = urlParams.get('ref');
    if(ref) document.getElementById('referrerInput').value = ref;
</script>
</body>
</html>
